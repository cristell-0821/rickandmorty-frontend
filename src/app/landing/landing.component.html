<div class="landing-wrapper">

  <!-- Logo -->
  <div class="landing-logo">
    <img src="assets/img/titulo.webp" alt="Rick and Morty" class="landing-title-img" />
    <p class="landing-subtitle">Elige tu experiencia</p>
  </div>

  <!-- Botones -->
  <div class="landing-cards">

    <a routerLink="/memory" class="mode-card mode-card--memory">
      <div class="mode-card__icon">
        <img src="assets/img/memoria.png" alt="Memoria" class="mode-icon-img" />
      </div>
      <h2 class="mode-card__title">Juego de Memoria</h2>
      <p class="mode-card__desc">Encuentra todos los pares de personajes. ¡Pon a prueba tu memoria con distintas dificultades!</p>
      <span class="mode-card__cta">Jugar →</span>
      <div class="mode-card__badge">NUEVO</div>
    </a>

    <a routerLink="/characters" class="mode-card">
      <div class="mode-card__icon">
        <img src="assets/img/buscador.png" alt="Buscador" class="mode-icon-img" />
      </div>
      <h2 class="mode-card__title">Buscador</h2>
      <p class="mode-card__desc">Explora todos los personajes del universo Rick & Morty. Filtra por nombre, estado y especie.</p>
      <span class="mode-card__cta">Explorar →</span>
    </a>

  </div>

</div>
